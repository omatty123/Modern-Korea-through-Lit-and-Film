<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#1a1a2e"/>
  <g transform="translate(32,32)">
    <!-- Film reel outer ring -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="#a67c00" stroke-width="3"/>
    <!-- Sprocket holes -->
    <circle cx="0" cy="-18" r="3.5" fill="#a67c00"/>
    <circle cx="15.6" cy="12.7" r="3.5" fill="#a67c00"/>
    <circle cx="-15.6" cy="12.7" r="3.5" fill="#a67c00"/>
    <circle cx="15.6" cy="-12.7" r="3.5" fill="#a67c00"/>
    <circle cx="-15.6" cy="-12.7" r="3.5" fill="#a67c00"/>
    <circle cx="0" cy="18" r="3.5" fill="#a67c00"/>
    <!-- Center hub -->
    <circle cx="0" cy="0" r="7" fill="#8b2232"/>
    <!-- Korean character 영 (film/movie) -->
    <text x="0" y="4" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#fff">영</text>
  </g>
</svg>
